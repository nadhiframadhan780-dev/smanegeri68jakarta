<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pemeringkatan PTN Indonesia 2026 - SMAN 68 Jakarta</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="pemeringkatan-ptn-indonesia-2026.css">
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="loader-spinner"></div>
        <p>Memuat Data...</p>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a href="sman68.html" class="home-btn" title="Kembali ke Website Utama">
                <i class="fas fa-home"></i>
            </a>
            <div class="header-logo">
                <img src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" alt="SMAN 68">
            </div>
            <div class="header-text">
                <h1>Pemeringkatan PTN Indonesia 2026</h1>
                <p>Data dari UniRanks, EduRank, dan QS World Rankings</p>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" data-tab="uniranks">
                <img src="https://www.unirank.org/i/uniRank-logo-hr.png" alt="UniRanks" class="tab-icon">
                <span>UniRanks 2026</span>
            </button>
            <button class="tab" data-tab="edurank">
                <img src="https://edurank.org/favicon.ico" alt="EduRank" class="tab-icon">
                <span>EduRank 2026</span>
            </button>
            <button class="tab" data-tab="qs">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c0/QS_University_Rankings_Logo.jpg" alt="QS" class="tab-icon">
                <span>QS World 2026</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Search & Info -->
        <div class="search-info-wrapper" id="searchInfoWrapper">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari universitas atau institut...">
            </div>
            <div class="methodology-info" id="methodologyInfo"></div>
        </div>

        <!-- Ranking Table -->
        <div class="ranking-container" id="rankingContainer">
            <div class="table-wrapper">
                <table id="rankingTable">
                    <thead>
                        <tr>
                            <th width="50">#</th>
                            <th>Universitas / Institut</th>
                            <th width="80">Skor</th>
                            <th width="60">Detail</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Detail Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-container" id="modalContainer">
                <div class="modal-header">
                    <h2 id="modalTitle"></h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-bar">
        <p>Data diambil dari sumber resmi. Terakhir diperbarui: 2026</p>
        <a href="sman68.html" class="btn-home-bottom">
            <i class="fas fa-home"></i> Kembali ke Website SMAN 68 Jakarta
        </a>
    </footer>

    <!-- Scripts -->
    <script src="pemeringkatan-ptn-indonesia-2026.js"></script>
</body>
</html>
