<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Website Resmi SMAN 68 Jakarta - Disiplin, Kreasi, Prestasi">
    
    <title>SMAN 68 Jakarta • Website Resmi</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- BACKGROUND LAYER -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <div class="bg-layer" id="bgLayer">
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>
        <div class="bg-gradient-top"></div>
        <div class="bg-gradient-bottom"></div>
    </div>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- FLOATING PARTICLES -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- LIGHT LEAKS -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <div class="light-leak light-leak-1"></div>
    <div class="light-leak light-leak-2"></div>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- FLOATING BUBBLES -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <div class="bubbles-container" id="bubblesContainer"></div>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- MAIN CONTENT -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <main class="main-content" id="mainContent">
        <!-- Glass Card -->
        <div class="glass-card" id="glassCard">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-outer-ring"></div>
                <div class="logo-middle-ring"></div>
                <div class="logo-inner-ring"></div>
                <div class="logo-glow"></div>
                <div class="logo-container">
                    <img 
                        src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" 
                        alt="SMAN 68 Jakarta" 
                        class="logo-img"
                        id="logoImg"
                    >
                </div>
            </div>

            <!-- Text Content -->
            <div class="text-content">
                <span class="badge-premium" id="badgePremium">✦ SMAN 68 JAKARTA ✦</span>
                
                <h1 class="main-title" id="mainTitle">
                    <span class="title-line">Selamat Datang</span>
                </h1>
                
                <p class="subtitle" id="subtitle">Website Resmi SMAN 68 Jakarta</p>
                
                <div class="slogan-container" id="sloganContainer">
                    <span class="slogan-item">Disiplin</span>
                    <span class="slogan-dot">•</span>
                    <span class="slogan-item">Kreasi</span>
                    <span class="slogan-dot">•</span>
                    <span class="slogan-item">Prestasi</span>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-section">
                <div class="progress-bar-container">
                    <div class="progress-bar-glow"></div>
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progressBarFill"></div>
                    </div>
                </div>
                <p class="progress-text" id="progressText">Mempersiapkan portal...</p>
            </div>

            <!-- Button -->
            <div class="button-section">
                <button class="btn-enter" id="btnEnter">
                    <span class="btn-text">Masuk Sekarang</span>
                    <span class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </span>
                    <span class="btn-shimmer"></span>
                </button>
            </div>
        </div>
    </main>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- TRANSITION OVERLAY -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <div class="transition-overlay" id="transitionOverlay"></div>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- SCRIPTS -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <script src="scripts.js"></script>
</body>
</html>
