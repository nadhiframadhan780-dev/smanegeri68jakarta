<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Daftar Akun - SMAN 68 Jakarta</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #006633;
            --primary-blue: #0088cc;
            --gradient: linear-gradient(135deg, #006633 0%, #0088cc 100%);
            --white: #ffffff;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 2px 10px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
            --radius-sm: 12px;
            --radius: 20px;
            --radius-full: 50px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background dengan overlay */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://media.indozone.id/crop/0x0:0x0/images/2026/01/14/1768352620_6966eb6c54bf6_maxresdefault.jpg') center/cover no-repeat;
            filter: brightness(0.25) saturate(0.8);
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,102,51,0.3) 0%, rgba(0,0,0,0.7) 100%);
        }

        /* Container utama */
        .register-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo di tengah atas */
        .logo-container {
            text-align: center;
            margin-bottom: -30px;
            position: relative;
            z-index: 2;
        }

        .logo-wrapper {
            display: inline-block;
            position: relative;
        }

        .logo-ring {
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: ringRotate 10s linear infinite;
        }

        .logo-ring:nth-child(2) {
            inset: -28px;
            border-style: dashed;
            animation-duration: 15s;
            animation-direction: reverse;
            border-color: rgba(0, 136, 204, 0.3);
        }

        .logo-ring:nth-child(3) {
            inset: -40px;
            border-style: dotted;
            animation-duration: 20s;
            border-color: rgba(0, 102, 51, 0.3);
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: white;
            padding: 8px;
            position: relative;
            z-index: 1;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        /* Card form */
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 40px 35px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .register-header p {
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .badge-sekolah {
            display: inline-block;
            background: var(--gradient);
            color: white;
            padding: 6px 16px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Progress bar */
        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 15px;
            left: 30px;
            right: 30px;
            height: 3px;
            background: var(--border);
            z-index: 1;
            transition: var(--transition);
        }

        .progress-line-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 3px;
            transition: width 0.4s ease;
            width: 0%;
        }

        .progress-step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .step-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .step-circle.active {
            background: var(--gradient);
            border-color: transparent;
            color: white;
            box-shadow: 0 5px 20px rgba(0, 102, 51, 0.3);
        }

        .step-circle.done {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .step-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-light);
            text-align: center;
        }

        .step-label.active {
            color: var(--primary);
            font-weight: 700;
        }

        /* Form steps */
        .form-step {
            display: none;
            animation: fadeSlide 0.4s ease;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text);
        }

        .form-group label .required {
            color: #ef4444;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 14px 14px 14px 42px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            background: #fafafa;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 102, 51, 0.05);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-back {
            background: #f1f5f9;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-back:hover {
            background: #e2e8f0;
        }

        .btn-next {
            background: var(--gradient);
            color: white;
            box-shadow: 0 8px 25px rgba(0, 102, 51, 0.3);
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 102, 51, 0.4);
        }

        .btn-submit {
            background: var(--gradient);
            color: white;
            width: 100%;
            box-shadow: 0 8px 25px rgba(0, 102, 51, 0.3);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 102, 51, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast custom */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: white;
            padding: 16px 22px;
            border-radius: var(--radius-sm);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            animation: toastIn 0.4s ease forwards;
            border-left: 5px solid var(--primary);
            max-width: 400px;
            pointer-events: auto;
        }

        @keyframes toastIn {
            to { transform: translateX(0); }
        }

        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }

        .toast i { font-size: 1.3rem; }
        .toast.success i { color: #10b981; }
        .toast.error i { color: #ef4444; }
        .toast.warning i { color: #f59e0b; }

        .toast-content { flex: 1; }
        .toast-title { font-weight: 700; font-size: 0.9rem; }
        .toast-message { font-size: 0.8rem; color: var(--text-light); }

        /* Footer link */
        .register-footer {
            text-align: center;
            margin-top: 25px;
            color: white;
            font-size: 0.9rem;
        }

        .register-footer a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
        }

        .register-footer a:hover {
            text-decoration: underline;
            opacity: 0.9;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .register-card {
                padding: 30px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .register-header h2 {
                font-size: 1.5rem;
            }

            .logo-img {
                width: 70px;
                height: 70px;
            }

            .btn-container {
                flex-direction: column;
            }

            .btn-back {
                order: 2;
            }

            .btn-next {
                order: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-container">
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Register Wrapper -->
    <div class="register-wrapper">
        <!-- Logo -->
        <div class="logo-container">
            <div class="logo-wrapper">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <img src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" alt="SMAN 68 Jakarta" class="logo-img">
            </div>
        </div>

        <!-- Card -->
        <div class="register-card">
            <div class="register-header">
                <span class="badge-sekolah">SMAN 68 JAKARTA</span>
                <h2>Daftar Akun Siswa</h2>
                <p>Isi data diri dengan lengkap dan benar</p>
            </div>

            <!-- Progress -->
            <div class="progress-container">
                <div class="progress-line">
                    <div class="progress-line-fill" id="progressFill"></div>
                </div>
                <div class="progress-step">
                    <div class="step-circle active" id="step1Circle">1</div>
                    <span class="step-label active" id="step1Label">Data Diri</span>
                </div>
                <div class="progress-step">
                    <div class="step-circle" id="step2Circle">2</div>
                    <span class="step-label" id="step2Label">Akun</span>
                </div>
                <div class="progress-step">
                    <div class="step-circle" id="step3Circle">3</div>
                    <span class="step-label" id="step3Label">Konfirmasi</span>
                </div>
            </div>

            <!-- Form -->
            <form id="registerForm" autocomplete="off">
                <!-- Step 1: Data Diri -->
                <div class="form-step active" id="step1">
                    <div class="form-group">
                        <label>Nama Lengkap <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="nama" placeholder="Nama lengkap sesuai dokumen" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>NISN <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="nisn" placeholder="Nomor Induk Siswa Nasional" maxlength="10" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tempat Lahir <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <i class="fas fa-map-marker-alt"></i>
                                <input type="text" id="tempatLahir" placeholder="Kota kelahiran" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tanggal Lahir <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <i class="fas fa-calendar"></i>
                                <input type="date" id="tanggalLahir" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Jenis Kelamin <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-venus-mars"></i>
                            <select id="jenisKelamin" required>
                                <option value="">Pilih jenis kelamin</option>
                                <option value="L">Laki-laki</option>
                                <option value="P">Perempuan</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Data Akun -->
                <div class="form-step" id="step2">
                    <div class="form-group">
                        <label>NIS (Nomor Induk Sekolah) <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-hashtag"></i>
                            <input type="text" id="nis" placeholder="NIS untuk login" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Kelas <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-graduation-cap"></i>
                            <select id="kelas" required>
                                <option value="">Pilih kelas</option>
                                <option value="X">X</option>
                                <option value="XI">XI</option>
                                <option value="XII">XII</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Jurusan <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-book"></i>
                            <select id="jurusan" required>
                                <option value="">Pilih jurusan</option>
                                <option value="IPA">IPA</option>
                                <option value="IPS">IPS</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Minimal 6 karakter" minlength="6" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Konfirmasi Password <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Ulangi password" minlength="6" required>
                        </div>
                    </div>
                </div>

                <!-- Step 3: Konfirmasi -->
                <div class="form-step" id="step3">
                    <div style="background: #f0fdf4; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #bbf7d0;">
                        <h4 style="margin-bottom: 15px; color: #006633;"><i class="fas fa-clipboard-check"></i> Ringkasan Data</h4>
                        <div id="ringkasanData" style="font-size: 0.85rem; line-height: 2;"></div>
                    </div>
                    <div style="background: #fff7ed; padding: 15px; border-radius: 12px; border: 1px solid #fed7aa; font-size: 0.8rem; color: #c2410c;">
                        <i class="fas fa-info-circle"></i> <strong>Catatan:</strong> Akun akan diverifikasi operator dalam 1x24 jam. Pastikan semua data sudah benar.
                    </div>
                </div>

                <!-- Buttons -->
                <div class="btn-container" id="btnContainer">
                    <button type="button" class="btn btn-back" id="btnBack" style="display:none;" onclick="prevStep()">
                        <i class="fas fa-arrow-left"></i> Kembali
                    </button>
                    <button type="button" class="btn btn-next" id="btnNext" onclick="nextStep()">
                        Selanjutnya <i class="fas fa-arrow-right"></i>
                    </button>
                    <button type="submit" class="btn btn-submit" id="btnSubmit" style="display:none;">
                        <i class="fas fa-paper-plane"></i> Daftar Sekarang
                    </button>
                </div>
            </form>
        </div>

        <div class="register-footer">
            Sudah punya akun? <a href="portal-siswa-68.html">Masuk di sini</a>
        </div>
    </div>

    <script>
        // Firebase Config (SAMA SEPERTI portal-siswa-68.js)
        const firebaseConfig = {
            apiKey: "AIzaSyDAcKcg3alPOTH3FFGelYmsW7jcMMe2PLI",
            authDomain: "upnvjdatsystem.firebaseapp.com",
            projectId: "upnvjdatsystem",
            storageBucket: "upnvjdatsystem.firebasestorage.app",
            messagingSenderId: "57095309946",
            appId: "1:57095309946:web:b0e9f3f86380d549ffc9c3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Global state
        let currentStep = 1;
        const totalSteps = 3;

        // Toast function
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const icons = {
                success: 'check-circle',
                error: 'exclamation-circle',
                warning: 'exclamation-triangle'
            };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${icons[type]}"></i>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // Update progress UI
        function updateProgress(step) {
            currentStep = step;
            
            // Update circles
            for (let i = 1; i <= totalSteps; i++) {
                const circle = document.getElementById(`step${i}Circle`);
                const label = document.getElementById(`step${i}Label`);
                circle.classList.remove('active', 'done');
                label.classList.remove('active');
                
                if (i < step) {
                    circle.classList.add('done');
                    circle.innerHTML = '<i class="fas fa-check"></i>';
                } else if (i === step) {
                    circle.classList.add('active');
                    circle.innerHTML = i;
                    label.classList.add('active');
                } else {
                    circle.innerHTML = i;
                }
            }

            // Update progress line
            const fillPercent = ((step - 1) / (totalSteps - 1)) * 100;
            document.getElementById('progressFill').style.width = fillPercent + '%';

            // Update form steps
            document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');

            // Update buttons
            const btnBack = document.getElementById('btnBack');
            const btnNext = document.getElementById('btnNext');
            const btnSubmit = document.getElementById('btnSubmit');

            btnBack.style.display = step === 1 ? 'none' : 'inline-flex';
            btnNext.style.display = step === totalSteps ? 'none' : 'inline-flex';
            btnSubmit.style.display = step === totalSteps ? 'inline-flex' : 'none';
        }

        // Navigasi step
        function nextStep() {
            if (currentStep === 1) {
                // Validasi step 1
                const nama = document.getElementById('nama').value.trim();
                const nisn = document.getElementById('nisn').value.trim();
                const tempatLahir = document.getElementById('tempatLahir').value.trim();
                const tanggalLahir = document.getElementById('tanggalLahir').value;
                const jenisKelamin = document.getElementById('jenisKelamin').value;

                if (!nama || !nisn || !tempatLahir || !tanggalLahir || !jenisKelamin) {
                    showToast('error', 'Data Belum Lengkap', 'Harap isi semua data diri yang wajib!');
                    return;
                }

                if (nisn.length < 10) {
                    showToast('error', 'NISN Tidak Valid', 'NISN harus 10 digit angka!');
                    return;
                }

                updateProgress(2);
            } else if (currentStep === 2) {
                // Validasi step 2
                const nis = document.getElementById('nis').value.trim();
                const kelas = document.getElementById('kelas').value;
                const jurusan = document.getElementById('jurusan').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (!nis || !kelas || !jurusan || !password || !confirmPassword) {
                    showToast('error', 'Data Belum Lengkap', 'Harap isi semua data akun yang wajib!');
                    return;
                }

                if (password.length < 6) {
                    showToast('error', 'Password Terlalu Pendek', 'Password minimal 6 karakter!');
                    return;
                }

                if (password !== confirmPassword) {
                    showToast('error', 'Password Tidak Cocok', 'Konfirmasi password tidak sesuai!');
                    return;
                }

                // Tampilkan ringkasan di step 3
                document.getElementById('ringkasanData').innerHTML = `
                    <div><strong>Nama:</strong> ${document.getElementById('nama').value}</div>
                    <div><strong>NISN:</strong> ${document.getElementById('nisn').value}</div>
                    <div><strong>Tempat/Tgl Lahir:</strong> ${document.getElementById('tempatLahir').value}, ${document.getElementById('tanggalLahir').value}</div>
                    <div><strong>Jenis Kelamin:</strong> ${document.getElementById('jenisKelamin').value === 'L' ? 'Laki-laki' : 'Perempuan'}</div>
                    <div><strong>NIS:</strong> ${nis}</div>
                    <div><strong>Kelas:</strong> ${kelas}</div>
                    <div><strong>Jurusan:</strong> ${jurusan}</div>
                `;

                updateProgress(3);
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                updateProgress(currentStep - 1);
            }
        }

        // Submit form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mendaftarkan...';

            try {
                // Cek apakah NIS sudah terdaftar
                const nis = document.getElementById('nis').value.trim();
                const existingSnapshot = await db.collection('siswa').where('nis', '==', nis).get();

                if (!existingSnapshot.empty) {
                    showToast('error', 'NIS Sudah Terdaftar', 'Nomor Induk Sekolah ini sudah digunakan. Silakan login atau hubungi operator.');
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = '<i class="fas fa-paper-plane"></i> Daftar Sekarang';
                    return;
                }

                // Data untuk Firestore
                const dataSiswa = {
                    nama: document.getElementById('nama').value.trim(),
                    nisn: document.getElementById('nisn').value.trim(),
                    tempatLahir: document.getElementById('tempatLahir').value.trim(),
                    tanggalLahir: document.getElementById('tanggalLahir').value,
                    jenisKelamin: document.getElementById('jenisKelamin').value,
                    nis: nis,
                    kelas: document.getElementById('kelas').value,
                    jurusan: document.getElementById('jurusan').value,
                    password: document.getElementById('password').value,
                    status: 'pending',
                    tanggalDaftar: firebase.firestore.FieldValue.serverTimestamp(),
                    tanggalMasuk: 'Juli 2024',
                    tanggalLulus: 'Mei 2027'
                };

                // Simpan ke Firestore
                await db.collection('siswa').add(dataSiswa);

                showToast('success', 'Pendaftaran Berhasil!', 'Akun Anda dalam proses verifikasi operator. Tunggu 1x24 jam.');

                // Redirect setelah 2 detik
                setTimeout(() => {
                    window.location.href = 'portal-siswa-68.html';
                }, 2000);

            } catch (error) {
                console.error('Error pendaftaran:', error);
                showToast('error', 'Gagal Mendaftar', 'Terjadi kesalahan. Silakan coba lagi nanti.');
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fas fa-paper-plane"></i> Daftar Sekarang';
            }
        });

        // Inisialisasi
        updateProgress(1);
    </script>
</body>
</html>
