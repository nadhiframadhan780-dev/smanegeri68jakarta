<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Portal Siswa - SMAN 68 Jakarta</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png">
    
    <link rel="stylesheet" href="portal-siswa-68.css">
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="loader-spinner"></div>
        <p>Memuat Portal Siswa...</p>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================ -->
    <!-- LOGIN OVERLAY -->
    <!-- ============================================ -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-bg"></div>
        <div class="login-card">
            <div class="login-logo-wrapper">
                <div class="login-logo-ring"></div>
                <div class="login-logo-ring"></div>
                <img src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" alt="SMAN 68" class="login-logo">
            </div>
            <h2>Portal Siswa</h2>
            <p>SMAN 68 Jakarta</p>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="loginNIS" placeholder="Nomor Induk Sekolah (NIS)" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <i class="fas fa-eye toggle-pass" id="loginPassToggle"></i>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Masuk</button>
            </form>
            <div class="login-footer">
                <a href="daftar-siswa-sman-68.html">Belum punya akun? Daftar</a>
                <a href="sman68.html"><i class="fas fa-home"></i> Website Utama</a>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN PORTAL (Hidden until login) -->
    <!-- ============================================ -->
    <div class="main-portal" id="mainPortal" style="display:none;">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <img src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" alt="Logo" class="topbar-logo">
                <div>
                    <h1>Portal Siswa</h1>
                    <span id="siswaNama">-</span>
                </div>
            </div>
            <div class="topbar-right">
                <span class="datetime" id="datetime"></span>
                <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</button>
            </div>
        </header>

        <!-- Content Area -->
        <main class="content">
            <!-- Sidebar -->
            <nav class="sidebar" id="sidebar">
                <a href="#" class="sidebar-item active" data-page="dashboard">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="#" class="sidebar-item" data-page="jadwal">
                    <i class="fas fa-calendar-alt"></i> Jadwal Pelajaran
                </a>
                <a href="#" class="sidebar-item" data-page="absensi">
                    <i class="fas fa-clipboard-check"></i> Absensi
                </a>
                <a href="#" class="sidebar-item" data-page="agenda">
                    <i class="fas fa-calendar-plus"></i> Agenda Pribadi
                </a>
                <a href="#" class="sidebar-item" data-page="riwayat">
                    <i class="fas fa-history"></i> Riwayat Absensi
                </a>
                <a href="#" class="sidebar-item" data-page="profil">
                    <i class="fas fa-user"></i> Profil
                </a>
                <a href="sman68.html" class="sidebar-item">
                    <i class="fas fa-home"></i> Website Utama
                </a>
            </nav>

            <!-- Page Container -->
            <div class="page-container" id="pageContainer"></div>
        </main>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

    <script src="portal-siswa-68.js"></script>
</body>
</html>
